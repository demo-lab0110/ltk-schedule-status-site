name: Update site data

on:
  schedule:
    # Avoid the busiest top-of-hour schedule window on GitHub Actions.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-site-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch latest site and live data
        run: |
          node <<'NODE'
          const fs = await import("node:fs");

          const GAS_URL = "https://script.google.com/macros/s/AKfycbwNzByFJex1ZVj7mKFrMnGfYDrRSK_6Ew1j5A-S6hQymMs8a7Emx1_wqWGPObNCe_0/exec";

          async function fetchJsonp(api) {
            const url = `${GAS_URL}?api=${api}&callback=__cb`;
            const response = await fetch(url, {
              headers: { "User-Agent": "ltk-schedule-status-site-data-updater" }
            });
            if (!response.ok) {
              throw new Error(`${api} GAS request failed: ${response.status}`);
            }

            const text = (await response.text()).replace(/^\uFEFF/, "");
            const match = text.match(/^__cb\(([\s\S]*)\);?\s*$/);
            if (!match) {
              throw new Error(`${api} returned invalid JSONP`);
            }

            return JSON.parse(match[1]);
          }

          const sitePayload = await fetchJsonp("site");
          if (!sitePayload.ok || !sitePayload.sheets) {
            throw new Error(sitePayload.error || "Invalid site data payload");
          }

          fs.writeFileSync("site-data.json", JSON.stringify({
            ok: true,
            updatedAt: sitePayload.updatedAt || new Date().toISOString(),
            sheets: sitePayload.sheets
          }));

          async function fetchText(url) {
            const response = await fetch(url, {
              headers: { "User-Agent": "ltk-schedule-status-site-data-updater" }
            });
            if (!response.ok) throw new Error(`request failed: ${response.status}`);
            return response.text();
          }

          function cell(row, names) {
            for (const name of names) {
              if (row && row[name] != null && String(row[name]).trim()) return String(row[name]).trim();
            }
            return "";
          }

          function decodeXml(value = "") {
            return String(value)
              .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1")
              .replace(/&amp;/g, "&")
              .replace(/&lt;/g, "<")
              .replace(/&gt;/g, ">")
              .replace(/&quot;/g, '"')
              .replace(/&#39;/g, "'");
          }

          function tag(xml, name) {
            const match = xml.match(new RegExp(`<${name}(?:\\s[^>]*)?>([\\s\\S]*?)<\\/${name}>`));
            return decodeXml(match?.[1] || "");
          }

          function attr(xml, name, attrName) {
            const match = xml.match(new RegExp(`<${name}[^>]*\\s${attrName}=["']([^"']+)["']`, "i"));
            return decodeXml(match?.[1] || "");
          }

          function teamKeyFromName(value) {
            const normalized = String(value || "").normalize("NFKC").toLowerCase();
            if (normalized.includes("dahlia") || normalized.includes("dd")) return "DD";
            if (normalized.includes("camellia") || normalized.includes("cc")) return "CC";
            if (normalized.includes("iris") || normalized.includes("it")) return "IT";
            if (normalized.includes("laurel") || normalized.includes("lr")) return "LR";
            return "";
          }

          function channelIdFromUrl(url) {
            const raw = String(url || "").trim();
            const channelMatch = raw.match(/youtube\.com\/channel\/([A-Za-z0-9_-]+)/i);
            if (channelMatch) return channelMatch[1];
            return "";
          }

          function normalizeYouTubeUrl(value) {
            const raw = String(value || "").trim();
            if (!raw) return "";
            if (/^https?:\/\//i.test(raw)) return raw;
            if (/^(www\.)?youtube\.com/i.test(raw)) return `https://${raw}`;
            if (/^@[\w.-]+$/.test(raw)) return `https://www.youtube.com/${raw}`;
            return raw;
          }

          function videosPageUrl(value, channelId = "") {
            const raw = normalizeYouTubeUrl(value);
            if (raw) {
              const base = raw.replace(/\/+$/, "");
              return /\/videos(?:[?#]|$)/.test(base) ? base : `${base}/videos`;
            }
            return channelId ? `https://www.youtube.com/channel/${channelId}/videos` : "";
          }

          async function resolveYouTubeChannelId(row) {
            const explicit = cell(row, ["チャンネルID", "YouTubeチャンネルID"]);
            if (explicit) return explicit;
            const youtubeUrl = normalizeYouTubeUrl(cell(row, ["YouTubeチャンネル", "YouTubeチャンネルURL"]));
            const fromUrl = channelIdFromUrl(youtubeUrl);
            if (fromUrl) return fromUrl;
            if (!youtubeUrl) return "";

            try {
              const html = await fetchText(youtubeUrl);
              const jsonMatch = html.match(/"channelId"\s*:\s*"(UC[A-Za-z0-9_-]+)"/);
              if (jsonMatch) return jsonMatch[1];
              const canonicalMatch = html.match(/youtube\.com\/channel\/(UC[A-Za-z0-9_-]+)/);
              if (canonicalMatch) return canonicalMatch[1];
            } catch (error) {
              console.warn(`YouTube channel resolve skipped: ${youtubeUrl} ${error.message}`);
            }
            return "";
          }

          async function fetchYouTubeOembed(videoId) {
            try {
              const text = await fetchText(`https://www.youtube.com/oembed?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${videoId}`)}&format=json`);
              return JSON.parse(text);
            } catch {
              return {};
            }
          }

          async function fetchLatestYouTubeVideo(row, channelId) {
            const youtubeUrl = normalizeYouTubeUrl(cell(row, ["YouTubeチャンネル", "YouTubeチャンネルURL"]));
            const pageUrl = videosPageUrl(youtubeUrl, channelId);
            if (!pageUrl) return null;

            const html = await fetchText(pageUrl);
            const videoId = html.match(/"videoId"\s*:\s*"([A-Za-z0-9_-]{11})"/)?.[1] || "";
            if (!videoId) return null;
            const oembed = await fetchYouTubeOembed(videoId);
            return {
              videoId,
              title: oembed.title || `YouTube動画 ${videoId}`,
              url: `https://www.youtube.com/watch?v=${videoId}`,
              thumbnail: oembed.thumbnail_url || `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`,
              publishedAt: new Date().toISOString(),
              channelId,
              channelTitle: oembed.author_name || "",
              memberName: cell(row, ["名前", "メンバー名"]),
              teamKey: teamKeyFromName(cell(row, ["チーム名"])),
              tier: cell(row, ["階級"]).toUpperCase(),
              role: cell(row, ["ロール"]).toUpperCase(),
              iconUrl: cell(row, ["アイコン"]),
              youtubeUrl
            };
          }

          async function buildClipVideos(sheets) {
            const members = sheets["選手一覧"] || sheets["サイト_選手プロフィール"] || [];
            const unique = new Map();
            for (const row of members) {
              const youtubeUrl = cell(row, ["YouTubeチャンネル", "YouTubeチャンネルURL"]);
              if (!youtubeUrl) continue;
              const name = cell(row, ["名前", "メンバー名"]);
              const role = cell(row, ["ロール"]).toUpperCase();
              if (!name) continue;
              const channelId = await resolveYouTubeChannelId(row);
              if (!channelId || unique.has(channelId)) continue;
              unique.set(channelId, { row, channelId });
            }

            const videos = [];
            for (const { row, channelId } of unique.values()) {
              try {
                const video = await fetchLatestYouTubeVideo(row, channelId);
                if (video) videos.push(video);
              } catch (error) {
                console.warn(`YouTube latest video skipped: ${channelId} ${error.message}`);
              }
            }
            return videos
              .sort((a, b) => new Date(b.publishedAt).getTime() - new Date(a.publishedAt).getTime())
              .slice(0, 120);
          }

          function shouldRefreshClips() {
            if (!fs.existsSync("clips-data.json")) return true;
            try {
              const current = JSON.parse(fs.readFileSync("clips-data.json", "utf8"));
              const updatedAt = new Date(current.updatedAt || 0).getTime();
              return !updatedAt || Date.now() - updatedAt > 60 * 60 * 1000;
            } catch {
              return true;
            }
          }

          try {
            if (shouldRefreshClips()) {
              const videos = await buildClipVideos(sitePayload.sheets);
              fs.writeFileSync("clips-data.json", JSON.stringify({
                ok: true,
                updatedAt: new Date().toISOString(),
                videos
              }));
            } else {
              console.log("Clip video update skipped: cache is fresh.");
            }
          } catch (error) {
            console.warn(`Clip video update skipped: ${error.message}`);
            if (!fs.existsSync("clips-data.json")) {
              fs.writeFileSync("clips-data.json", JSON.stringify({
                ok: true,
                updatedAt: new Date().toISOString(),
                videos: [],
                error: error.message
              }));
            }
          }

          try {
            const livePayload = await fetchJsonp("live");
            if (!livePayload.ok) {
              throw new Error(livePayload.error || "Invalid live data payload");
            }
            fs.writeFileSync("live-data.json", JSON.stringify({
              ok: true,
              updatedAt: livePayload.updatedAt || new Date().toISOString(),
              configured: Boolean(livePayload.configured),
              streams: livePayload.streams || []
            }));
          } catch (error) {
            console.warn(`LIVE update skipped: ${error.message}`);
            if (!fs.existsSync("live-data.json")) {
              fs.writeFileSync("live-data.json", JSON.stringify({
                ok: true,
                updatedAt: new Date().toISOString(),
                configured: false,
                streams: [],
                error: error.message
              }));
            }
          }
          NODE

      - name: Commit updated data
        run: |
          if git diff --quiet -- site-data.json live-data.json clips-data.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site-data.json live-data.json clips-data.json
          git commit -m "Update site data"
          git push
