name: Update site data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-site-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch latest site and live data
        run: |
          node <<'NODE'
          const fs = await import("node:fs");

          const GAS_URL = "https://script.google.com/macros/s/AKfycbwNzByFJex1ZVj7mKFrMnGfYDrRSK_6Ew1j5A-S6hQymMs8a7Emx1_wqWGPObNCe_0/exec";

          async function fetchJsonp(api) {
            const url = `${GAS_URL}?api=${api}&callback=__cb`;
            const response = await fetch(url, {
              headers: { "User-Agent": "ltk-schedule-status-site-data-updater" }
            });
            if (!response.ok) {
              throw new Error(`${api} GAS request failed: ${response.status}`);
            }

            const text = (await response.text()).replace(/^\uFEFF/, "");
            const match = text.match(/^__cb\(([\s\S]*)\);?\s*$/);
            if (!match) {
              throw new Error(`${api} returned invalid JSONP`);
            }

            return JSON.parse(match[1]);
          }

          const sitePayload = await fetchJsonp("site");
          if (!sitePayload.ok || !sitePayload.sheets) {
            throw new Error(sitePayload.error || "Invalid site data payload");
          }

          fs.writeFileSync("site-data.json", JSON.stringify({
            ok: true,
            updatedAt: sitePayload.updatedAt || new Date().toISOString(),
            sheets: sitePayload.sheets
          }));

          try {
            const livePayload = await fetchJsonp("live");
            if (!livePayload.ok) {
              throw new Error(livePayload.error || "Invalid live data payload");
            }
            fs.writeFileSync("live-data.json", JSON.stringify({
              ok: true,
              updatedAt: livePayload.updatedAt || new Date().toISOString(),
              configured: Boolean(livePayload.configured),
              streams: livePayload.streams || []
            }));
          } catch (error) {
            console.warn(`LIVE update skipped: ${error.message}`);
            if (!fs.existsSync("live-data.json")) {
              fs.writeFileSync("live-data.json", JSON.stringify({
                ok: true,
                updatedAt: new Date().toISOString(),
                configured: false,
                streams: [],
                error: error.message
              }));
            }
          }
          NODE

      - name: Commit updated data
        run: |
          if git diff --quiet -- site-data.json live-data.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site-data.json live-data.json
          git commit -m "Update site data"
          git push
